name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Package application
        run: |
          bash scripts/package_release.sh dist url-shortener.tgz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: url-shortener-package
          path: dist/url-shortener.tgz

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: url-shortener-package

      - name: Set up SSH key
        run: |
          mkdir -p /tmp/ssh
          cat > /tmp/ssh/id_rsa <<'EOF'
          ${{ secrets.SSH_PRIVATE_KEY }}
          EOF
          chmod 600 /tmp/ssh/id_rsa

      - name: Copy artifact to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.SSH_USER }}
          key_path: /tmp/ssh/id_rsa
          port: 22
          source: "url-shortener.tgz"
          target: "/tmp"

      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.SSH_USER }}
          key_path: /tmp/ssh/id_rsa
          port: 22
          script: |
            tar -xzf /tmp/url-shortener.tgz scripts/deploy_remote.sh
            chmod +x scripts/deploy_remote.sh
            sudo APP_VERSION="${{ github.sha }}" APP_BUILD="${{ github.run_number }}" ./scripts/deploy_remote.sh /tmp/url-shortener.tgz url-shortener prod
